<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FiveM Cheater Lookup</title>
<style>
body{margin:0;background:#000;color:white;font-family:Arial;text-align:center}
.container{max-width:700px;margin:auto;padding:30px}
.logo{width:140px;margin-bottom:15px}
h1{color:red;font-size:45px}
input,select{width:100%;padding:12px;margin:8px 0;border:none;border-radius:8px}
button{padding:12px 20px;border:none;border-radius:8px;margin:5px;cursor:pointer}
.save{background:green;color:white}
.search{background:red;color:white}
.discord{display:inline-block;margin-top:20px;background:#5865F2;color:white;text-decoration:none;padding:12px 25px;border-radius:10px}
.result{margin-top:25px;background:#111;padding:20px;border-radius:10px}
a{color:#5865F2}
</style>
</head>
<body>

<div class="container">
<img src="logo.png" class="logo">

<h1>FIVEM CHEATER LOOKUP</h1>

<input id="id" placeholder="Discord ID">

<select id="status">
<option value="clean">Clean</option>
<option value="sus">Sus</option>
<option value="exposed">Exposed</option>
<option value="banned">Banned</option>
</select>

<input id="note" placeholder="Note">
<input id="evidence" placeholder="Evidence Link">
<input id="key" type="password" placeholder="Admin Key">

<button class="save" onclick="save()">Gem / Update</button>
<button class="search" onclick="search()">Søg</button>

<br>

<a class="discord" href="https://discord.gg/tFQAryybR8" target="_blank">
🚨 Join Discord
</a>

<div id="out" class="result"></div>
</div>

<script>
async function save(){
  let id = document.getElementById("id").value;
  let key = document.getElementById("key").value;

  if(!id){
    alert("Indtast Discord ID");
    return;
  }

  let res = await fetch("/api/user/" + id, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "admin-key": key
    },
    body: JSON.stringify({
      status: document.getElementById("status").value,
      note: document.getElementById("note").value,
      evidence: document.getElementById("evidence").value
    })
  });

  if(res.status === 403){
    alert("Forkert admin key");
    return;
  }

  alert("Gemt!");
}

async function search(){
  let id = document.getElementById("id").value;

  if(!id){
    alert("Indtast Discord ID");
    return;
  }

  let res = await fetch("/api/user/" + id);
  let data = await res.json();

  if(!data){
    document.getElementById("out").innerHTML = "<h2>Ikke fundet</h2>";
    return;
  }

  document.getElementById("out").innerHTML = `
    <h2>${id}</h2>
    <p><b>Status:</b> ${data.status}</p>
    <p><b>Note:</b> ${data.note || "Ingen note"}</p>
    <p><b>Evidence:</b> ${
      data.evidence
      ? `<a href="${data.evidence}" target="_blank">Åbn bevis</a>`
      : "Ingen"
    }</p>
  `;
}
</script>

</body>
</html>
